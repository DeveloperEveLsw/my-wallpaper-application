<main id="m0-popup" class="popup-card" aria-label="M0 키보드 입력 검증">
  <p class="popup-eyebrow">POPUP FOCUS TEST</p>
  <h1>키보드 입력 검증</h1>
  <label for="keyboard-input">문자열을 입력하고 Enter를 누르세요.</label>
  <input
    id="keyboard-input"
    type="text"
    maxlength="80"
    autocomplete="off"
    placeholder="여기에 입력"
  />
  <output id="keyboard-result" aria-live="polite">입력 대기 중</output>
  <button id="close-popup" type="button">닫기 (Esc)</button>
</main>
